<!DOTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cüzdan Asistanı | Gelir & Gider Takip</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: #0a0a0c;
    color: #ededee;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow-x: hidden;
  }

  #root {
    max-width: 500px;
    margin: 0 auto;
    min-height: 100vh;
    background: #0a0a0c;
    padding-bottom: 80px;
  }

  /* Kartlar */
  .card {
    background: #121216;
    border: 1px solid #1f1f24;
    border-radius: 24px;
    padding: 18px;
  }

  .btn {
    cursor: pointer;
    transition: all 0.1s ease;
    font-weight: 600;
    border: none;
    background: none;
  }

  .btn:active {
    transform: scale(0.96);
    opacity: 0.8;
  }

  /* İşlem satırı */
  .tx-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-radius: 20px;
    background: #121216;
    margin-bottom: 8px;
    cursor: pointer;
    border: 1px solid #1f1f24;
  }

  .tx-row:active {
    background: #1a1a20;
  }

  /* Form elemanları */
  .input-field {
    width: 100%;
    background: #18181c;
    border-radius: 20px;
    padding: 14px 16px;
    color: #f0ede8;
    font-size: 15px;
    margin-bottom: 12px;
    border: 1px solid #2a2a30;
    font-family: inherit;
  }

  .input-field:focus {
    border-color: #7c3aed;
    outline: none;
    background: #202026;
  }

  select.input-field {
    cursor: pointer;
  }

  /* Chip butonları */
  .chip {
    display: inline-flex;
    align-items: center;
    padding: 6px 14px;
    border-radius: 40px;
    font-size: 12px;
    font-weight: 600;
    background: #1e1e24;
    cursor: pointer;
    border: none;
    color: #ddd;
    font-family: inherit;
  }

  /* Progress bar */
  .progress-bar {
    height: 6px;
    background: #2a2a30;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.3s;
    background: #34d399;
  }

  /* AUD badge */
  .aud-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #0f1a22;
    border: 1px solid #1e4a6e;
    border-radius: 8px;
    padding: 3px 8px;
    font-size: 10px;
    font-family: monospace;
    color: #5bc4f5;
    font-weight: 700;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
  }

  .modal-card {
    background: #121216;
    border-radius: 32px 32px 0 0;
    width: 100%;
    padding: 28px 22px 38px;
    max-height: 80vh;
    overflow-y: auto;
  }

  /* Alt navigasyon */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-width: 500px;
    margin: 0 auto;
    background: #0c0c10;
    backdrop-filter: blur(12px);
    border-top: 1px solid #22222a;
    display: flex;
    justify-content: space-around;
    padding: 8px 20px 22px;
    z-index: 40;
  }

  .nav-btn {
    background: none;
    border: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    color: #8e8e98;
    font-weight: 600;
    cursor: pointer;
  }

  .nav-active {
    color: #c084fc;
  }

  /* Floating button */
  .floating-btn {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 28px;
    background: #7c3aed;
    box-shadow: 0 6px 14px rgba(124, 58, 237, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    cursor: pointer;
    z-index: 30;
    border: none;
    color: white;
  }

  .floating-btn:active {
    transform: scale(0.92);
  }

  .avatar {
    width: 48px;
    height: 48px;
    border-radius: 30px;
    background: #2a2a32;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
  }

  .slide-up {
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .flex-between {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .gap-2 {
    gap: 8px;
  }

  .mt-2 {
    margin-top: 8px;
  }

  .mt-3 {
    margin-top: 12px;
  }

  .mb-2 {
    margin-bottom: 8px;
  }

  .mb-3 {
    margin-bottom: 12px;
  }

  .text-center {
    text-align: center;
  }

  .text-green {
    color: #34d399;
  }

  .text-red {
    color: #f87171;
  }

  .text-purple {
    color: #c4b5fd;
  }

  .text-muted {
    color: #aaa;
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
// ---------- REACT ve REACT DOM (CDN) ----------
// Önce React ve ReactDOM'u yükle
(function() {
  const script1 = document.createElement('script');
  script1.src = 'https://unpkg.com/react@18.2.0/umd/react.development.js';
  script1.onload = function() {
    const script2 = document.createElement('script');
    script2.src = 'https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js';
    script2.onload = function() {
      // React ve ReactDOM hazır, şimdi uygulamayı çalıştır
      initApp();
    };
    document.head.appendChild(script2);
  };
  document.head.appendChild(script1);
})();

function initApp() {
  const { useState, useEffect } = React;

  // ---------- SABİTLER ----------
  const PEOPLE = ["Erdal", "A.A", "N.A"];

  const formatTRY = (n) => {
    return new Intl.NumberFormat("tr-TR", { style: "currency", currency: "TRY", maximumFractionDigits: 0 }).format(n || 0);
  };

  const formatAUD = (n) => {
    return new Intl.NumberFormat("en-AU", { style: "currency", currency: "AUD", minimumFractionDigits: 2 }).format(n || 0);
  };

  const formatDateShort = (d) => {
    if (!d) return "";
    return new Date(d).toLocaleDateString("tr-TR", { day: "numeric", month: "short" });
  };

  // Örnek veri
  const SAMPLE_TXS = [
    { id: 1, type: "income", person: "Erdal", amount: 15000, note: "Mart maaşı", date: "2026-03-01" },
    { id: 2, type: "expense", person: "Erdal", amount: 3500, note: "Kira", date: "2026-03-03" },
    { id: 3, type: "expense", person: "A.A", amount: 850, note: "Market alışverişi", date: "2026-03-05" },
    { id: 4, type: "income", person: "A.A", amount: 2200, note: "Freelance proje", date: "2026-03-07" },
    { id: 5, type: "expense", person: "N.A", amount: 320, note: "Ulaşım", date: "2026-03-08" },
    { id: 6, type: "income", person: "N.A", amount: 5000, note: "Maaş", date: "2026-03-09" },
    { id: 7, type: "expense", person: "Erdal", amount: 540, note: "Sinema + yemek", date: "2026-03-12" },
  ];

  // ---------- ANA BİLEŞEN ----------
  const App = () => {
    const [txs, setTxs] = useState(() => {
      try {
        const saved = localStorage.getItem("wallet_data");
        return saved ? JSON.parse(saved) : SAMPLE_TXS;
      } catch (e) {
        return SAMPLE_TXS;
      }
    });
    const [rate, setRate] = useState(0.032);
    const [rateLoading, setRateLoading] = useState(true);
    const [view, setView] = useState("home");
    const [selectedPerson, setSelectedPerson] = useState(null);
    const [editTarget, setEditTarget] = useState(null);
    const [detailModal, setDetailModal] = useState(null);
    const [filterType, setFilterType] = useState("all");
    const [filterPerson, setFilterPerson] = useState("all");
    const [searchText, setSearchText] = useState("");
    const [monthViewKey, setMonthViewKey] = useState(null);
    const [personTxFilter, setPersonTxFilter] = useState("all");
    const [personSearch, setPersonSearch] = useState("");

    const blankForm = { type: "expense", person: "Erdal", amount: "", note: "", date: new Date().toISOString().split("T")[0] };
    const [form, setForm] = useState(blankForm);

    // LocalStorage'a kaydet
    useEffect(() => {
      localStorage.setItem("wallet_data", JSON.stringify(txs));
    }, [txs]);

    // Döviz kuru çek
    useEffect(() => {
      const fetchRate = async () => {
        try {
          const res = await fetch("https://api.frankfurter.app/latest?from=TRY&to=AUD");
          const data = await res.json();
          if (data.rates && data.rates.AUD) setRate(data.rates.AUD);
        } catch (err) {
          console.warn("Kur çekilemedi");
        } finally {
          setRateLoading(false);
        }
      };
      fetchRate();
    }, []);

    const toAUD = (n) => (n || 0) * rate;

    // Hesaplamalar
    const totalIncome = txs.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0);
    const totalExpense = txs.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0);
    const balance = totalIncome - totalExpense;

    const personStats = PEOPLE.map(p => {
      const inc = txs.filter(t => t.person === p && t.type === "income").reduce((s, t) => s + t.amount, 0);
      const exp = txs.filter(t => t.person === p && t.type === "expense").reduce((s, t) => s + t.amount, 0);
      return { name: p, income: inc, expense: exp, balance: inc - exp };
    });

    // Aylık gruplama
    const monthMap = {};
    txs.forEach(t => {
      if (!t.date) return;
      const d = new Date(t.date);
      const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
      if (!monthMap[key]) {
        monthMap[key] = { inc: 0, exp: 0, label: d.toLocaleDateString("tr-TR", { month: "long", year: "numeric" }), transactions: [] };
      }
      monthMap[key][t.type === "income" ? "inc" : "exp"] += t.amount;
      monthMap[key].transactions.push(t);
    });
    const monthKeys = Object.keys(monthMap).sort().reverse();

    // Ana ekran filtresi
    const filteredHome = txs.filter(t => {
      if (filterType !== "all" && t.type !== filterType) return false;
      if (filterPerson !== "all" && t.person !== filterPerson) return false;
      if (searchText.trim() !== "" && !(t.note || "").toLowerCase().includes(searchText.toLowerCase())) return false;
      return true;
    }).sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 20);

    const openAdd = () => {
      setForm(blankForm);
      setEditTarget(null);
      setView("add");
    };

    const openEdit = (tx) => {
      setForm({ ...tx, amount: String(tx.amount) });
      setEditTarget(tx);
      setView("add");
      setDetailModal(null);
    };

    const deleteTx = (id) => {
      setTxs(prev => prev.filter(t => t.id !== id));
      setDetailModal(null);
    };

    const submitTx = () => {
      if (!form.amount || !form.person) return;
      const amountNum = parseFloat(form.amount);
      if (isNaN(amountNum)) return;
      const newTx = { ...form, amount: amountNum, id: editTarget ? editTarget.id : Date.now() };
      if (editTarget) {
        setTxs(prev => prev.map(t => t.id === editTarget.id ? newTx : t));
      } else {
        setTxs(prev => [...prev, newTx]);
      }
      setView("home");
      setEditTarget(null);
      setForm(blankForm);
    };

    const goHome = () => {
      setView("home");
      setSelectedPerson(null);
      setMonthViewKey(null);
      setFilterType("all");
      setFilterPerson("all");
      setSearchText("");
      setDetailModal(null);
    };

    const openPersonDetail = (name) => {
      setSelectedPerson(name);
      setPersonTxFilter("all");
      setPersonSearch("");
      setView("person");
    };

    const openMonthDetail = (key) => {
      setMonthViewKey(key);
      setView("month");
    };

    const currentMonthData = monthViewKey ? monthMap[monthViewKey] : null;
    const personTxs = selectedPerson ? txs.filter(t => t.person === selectedPerson && (personTxFilter === "all" || t.type === personTxFilter)).filter(t => personSearch === "" || (t.note || "").toLowerCase().includes(personSearch.toLowerCase())).sort((a, b) => new Date(b.date) - new Date(a.date)) : [];

    // İşlem satırı bileşeni
    const TransactionRow = ({ tx, onClick }) => {
      return React.createElement("div", { className: "tx-row", onClick: () => onClick(tx) },
        React.createElement("div", { style: { display: "flex", gap: 12, alignItems: "center", flex: 1 } },
          React.createElement("div", { style: { width: 42, height: 42, borderRadius: 30, background: tx.type === "income" ? "#0e2a1f" : "#2c1a1a", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 } },
            tx.type === "income" ? "📈" : "💸"
          ),
          React.createElement("div", null,
            React.createElement("div", { style: { fontWeight: 700 } }, tx.note || (tx.type === "income" ? "Gelir" : "Harcama")),
            React.createElement("div", { style: { fontSize: 11, color: "#999", display: "flex", gap: 6, marginTop: 4 } },
              React.createElement("span", null, tx.person),
              React.createElement("span", null, formatDateShort(tx.date))
            )
          )
        ),
        React.createElement("div", { style: { textAlign: "right" } },
          React.createElement("div", { style: { fontWeight: 800, fontFamily: "monospace", color: tx.type === "income" ? "#34d399" : "#f87171" } },
            tx.type === "income" ? `+${formatTRY(tx.amount)}` : `-${formatTRY(tx.amount)}`
          ),
          React.createElement("div", { className: "aud-badge", style: { fontSize: 9, marginTop: 3 } }, `🇦🇺 ${formatAUD(toAUD(tx.amount))}`)
        )
      );
    };

    // Ana ekran
    const HomeView = () => {
      return React.createElement("div", { className: "slide-up", style: { padding: "0 18px" } },
        // Balance kartı
        React.createElement("div", { className: "card", style: { marginBottom: 24, background: "linear-gradient(135deg, #17132a, #0f0f17)" } },
          React.createElement("div", { style: { fontSize: 11, fontWeight: 600, color: "#c4b5fd" } }, "TOPLAM BAKİYE"),
          React.createElement("div", { style: { fontSize: 36, fontWeight: 800, fontFamily: "monospace", color: balance >= 0 ? "#c4b5fd" : "#ff9f8f" } }, formatTRY(balance)),
          React.createElement("div", { className: "aud-badge", style: { background: "#2a1e44", marginTop: 5 } }, `🇦🇺 ${formatAUD(toAUD(balance))}`),
          React.createElement("div", { style: { display: "flex", gap: 20, marginTop: 16 } },
            React.createElement("div", null,
              React.createElement("div", { style: { fontSize: 10, color: "#aaa" } }, "GELİR"),
              React.createElement("div", { style: { fontWeight: 800, color: "#34d399" } }, formatTRY(totalIncome)),
              React.createElement("div", { className: "aud-badge", style: { marginTop: 2 } }, `A$ ${toAUD(totalIncome).toFixed(2)}`)
            ),
            React.createElement("div", null,
              React.createElement("div", { style: { fontSize: 10, color: "#aaa" } }, "GİDER"),
              React.createElement("div", { style: { fontWeight: 800, color: "#f87171" } }, formatTRY(totalExpense)),
              React.createElement("div", { className: "aud-badge", style: { marginTop: 2 } }, `A$ ${toAUD(totalExpense).toFixed(2)}`)
            )
          )
        ),

        // Kişi kartları
        React.createElement("div", { style: { marginBottom: 20 } },
          React.createElement("div", { style: { fontSize: 14, fontWeight: 700, marginBottom: 12 } }, "👥 Kişi Bazında"),
          personStats.map(p => {
            const saveRate = p.income > 0 ? Math.min(100, (p.balance / p.income) * 100) : 0;
            return React.createElement("div", { key: p.name, className: "card", style: { marginBottom: 10, cursor: "pointer" }, onClick: () => openPersonDetail(p.name) },
              React.createElement("div", { className: "flex-between" },
                React.createElement("div", null,
                  React.createElement("span", { style: { fontWeight: 800 } }, p.name),
                  React.createElement("div", { style: { fontSize: 11, color: "#aaa" } }, `tasarruf %${Math.round(saveRate)}`)
                ),
                React.createElement("div", { style: { textAlign: "right" } },
                  React.createElement("div", { style: { fontWeight: 700 } }, formatTRY(p.balance)),
                  React.createElement("div", { className: "aud-badge" }, `A$ ${toAUD(p.balance).toFixed(2)}`)
                )
              ),
              React.createElement("div", { className: "progress-bar" },
                React.createElement("div", { className: "progress-fill", style: { width: `${saveRate}%` } })
              )
            );
          })
        ),

        // Filtreler
        React.createElement("div", { style: { display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 } },
          React.createElement("select", { className: "chip", value: filterType, onChange: e => setFilterType(e.target.value) },
            React.createElement("option", { value: "all" }, "📌 Tümü"),
            React.createElement("option", { value: "income" }, "💰 Gelir"),
            React.createElement("option", { value: "expense" }, "💸 Gider")
          ),
          React.createElement("select", { className: "chip", value: filterPerson, onChange: e => setFilterPerson(e.target.value) },
            React.createElement("option", { value: "all" }, "👤 Tüm kişiler"),
            PEOPLE.map(p => React.createElement("option", { key: p, value: p }, p))
          )
        ),

        // Not arama
        React.createElement("input", {
          type: "text",
          className: "input-field",
          placeholder: "🔍 Not içinde ara (maaş, kira, market...)",
          value: searchText,
          onChange: e => setSearchText(e.target.value),
          style: { marginBottom: 16 }
        }),

        React.createElement("div", { style: { fontWeight: 700, margin: "6px 0 8px" } }, "📋 Son İşlemler"),
        filteredHome.map(tx => React.createElement(TransactionRow, { key: tx.id, tx: tx, onClick: t => setDetailModal(t) })),
        filteredHome.length === 0 && React.createElement("div", { style: { textAlign: "center", padding: 40, color: "#555" } }, "İşlem yok. + ile ekleyin"),

        // Aylar
        React.createElement("div", { style: { marginTop: 24, marginBottom: 30 } },
          React.createElement("div", { style: { fontSize: 14, fontWeight: 700, marginBottom: 12 } }, "📆 Aylık Özetler"),
          React.createElement("div", { style: { display: "flex", gap: 10, overflowX: "auto", paddingBottom: 8 } },
            monthKeys.map(key => {
              const m = monthMap[key];
              return React.createElement("div", { key: key, className: "card", style: { padding: "10px 16px", minWidth: 110, cursor: "pointer" }, onClick: () => openMonthDetail(key) },
                React.createElement("div", { style: { fontWeight: 800, fontSize: 13 } }, m.label.split(" ")[0]),
                React.createElement("div", { style: { fontSize: 12 } },
                  React.createElement("span", { style: { color: "#34d399" } }, formatTRY(m.inc)),
                  " / ",
                  React.createElement("span", { style: { color: "#f87171" } }, formatTRY(m.exp))
                ),
                React.createElement("div", { style: { fontSize: 11, color: "#aaa" } }, formatTRY(m.inc - m.exp))
              );
            })
          )
        )
      );
    };

    // Kişi detay görünümü
    const PersonView = () => {
      if (!selectedPerson) return null;
      const pStat = personStats.find(p => p.name === selectedPerson);
      return React.createElement("div", { className: "slide-up", style: { padding: "0 18px" } },
        React.createElement("button", { className: "btn", onClick: goHome, style: { background: "#25252e", padding: "8px 18px", borderRadius: 40, marginBottom: 16 } }, "← Ana Sayfa"),
        React.createElement("div", { style: { display: "flex", gap: 14, alignItems: "center", marginBottom: 20 } },
          React.createElement("div", { className: "avatar" }, selectedPerson[0]),
          React.createElement("div", null,
            React.createElement("div", { style: { fontWeight: 800, fontSize: 22 } }, selectedPerson),
            React.createElement("div", { style: { color: "#34d399" } }, `Net ${formatTRY(pStat?.balance || 0)}`)
          )
        ),
        React.createElement("div", { style: { display: "flex", gap: 12, marginBottom: 16 } },
          React.createElement("select", { className: "chip", value: personTxFilter, onChange: e => setPersonTxFilter(e.target.value) },
            React.createElement("option", { value: "all" }, "Tüm işlemler"),
            React.createElement("option", { value: "income" }, "Gelirler"),
            React.createElement("option", { value: "expense" }, "Giderler")
          ),
          React.createElement("input", {
            className: "input-field",
            style: { padding: "8px 14px", margin: 0 },
            placeholder: "🔍 Not ara",
            value: personSearch,
            onChange: e => setPersonSearch(e.target.value)
          })
        ),
        personTxs.map(tx => React.createElement(TransactionRow, { key: tx.id, tx: tx, onClick: t => setDetailModal(t) })),
        personTxs.length === 0 && React.createElement("div", { style: { textAlign: "center", padding: 40, color: "#666" } }, "Kayıt yok"),
        React.createElement("button", {
          className: "floating-btn",
          style: { position: "relative", marginTop: 20, width: "100%", borderRadius: 60, background: "#7c3aed" },
          onClick: () => { setForm({ ...blankForm, person: selectedPerson }); setEditTarget(null); setView("add"); }
        }, "+ Yeni İşlem")
      );
    };

    // Ay görünümü
    const MonthView = () => {
      if (!monthViewKey || !currentMonthData) return null;
      return React.createElement("div", { className: "slide-up", style: { padding: "0 18px" } },
        React.createElement("button", { className: "btn", onClick: goHome, style: { background: "#25252e", padding: "8px 18px", borderRadius: 40, marginBottom: 16 } }, "← Geri"),
        React.createElement("div", { className: "card", style: { padding: 20, textAlign: "center", marginBottom: 20 } },
          React.createElement("div", { style: { fontSize: 20, fontWeight: 800 } }, currentMonthData.label),
          React.createElement("div", { style: { display: "flex", justifyContent: "center", gap: 20, marginTop: 12 } },
            React.createElement("div", null,
              React.createElement("div", null, "💰 Gelir"),
              React.createElement("div", { style: { fontWeight: 800, color: "#34d399" } }, formatTRY(currentMonthData.inc))
            ),
            React.createElement("div", null,
              React.createElement("div", null, "💸 Gider"),
              React.createElement("div", { style: { fontWeight: 800, color: "#f87171" } }, formatTRY(currentMonthData.exp))
            ),
            React.createElement("div", null,
              React.createElement("div", null, "📌 Net"),
              React.createElement("div", { style: { fontWeight: 800 } }, formatTRY(currentMonthData.inc - currentMonthData.exp))
            )
          )
        ),
        React.createElement("div", { style: { fontWeight: 700, marginBottom: 12 } }, "📅 Ayın işlemleri"),
        currentMonthData.transactions.sort((a, b) => new Date(b.date) - new Date(a.date)).map(tx => React.createElement(TransactionRow, { key: tx.id, tx: tx, onClick: t => setDetailModal(t) }))
      );
    };

    // Form görünümü
    const AddView = () => {
      return React.createElement("div", { className: "slide-up", style: { padding: "0 18px" } },
        React.createElement("div", { className: "card", style: { padding: 26 } },
          React.createElement("h3", { style: { marginBottom: 16 } }, editTarget ? "✏️ Düzenle" : "➕ Yeni İşlem"),
          React.createElement("select", { className: "input-field", value: form.type, onChange: e => setForm({ ...form, type: e.target.value }) },
            React.createElement("option", { value: "income" }, "💰 Gelir"),
            React.createElement("option", { value: "expense" }, "💸 Gider")
          ),
          React.createElement("select", { className: "input-field", value: form.person, onChange: e => setForm({ ...form, person: e.target.value }) },
            PEOPLE.map(p => React.createElement("option", { key: p, value: p }, p))
          ),
          React.createElement("input", { className: "input-field", type: "number", placeholder: "₺ Tutar", value: form.amount, onChange: e => setForm({ ...form, amount: e.target.value }) }),
          React.createElement("input", { className: "input-field", placeholder: "📝 Not (maaş, kira, market...)", value: form.note, onChange: e => setForm({ ...form, note: e.target.value }) }),
          React.createElement("input", { className: "input-field", type: "date", value: form.date, onChange: e => setForm({ ...form, date: e.target.value }) }),
          React.createElement("div", { style: { display: "flex", gap: 12, marginTop: 16 } },
            React.createElement("button", { className: "btn", onClick: submitTx, style: { flex: 1, background: "#7c3aed", padding: 14, borderRadius: 60 } }, "Kaydet"),
            React.createElement("button", { className: "btn", onClick: goHome, style: { flex: 1, background: "#2a2a32", padding: 14, borderRadius: 60 } }, "İptal")
          )
        )
      );
    };

    // Detay modal
    const DetailModal = () => {
      if (!detailModal) return null;
      return React.createElement("div", { className: "modal-overlay", onClick: () => setDetailModal(null) },
        React.createElement("div", { className: "modal-card", onClick: e => e.stopPropagation() },
          React.createElement("div", { style: { fontWeight: 800, fontSize: 22 } }, detailModal.type === "income" ? "Gelir Detayı" : "Gider Detayı"),
          React.createElement("div", { style: { fontSize: 32, fontFamily: "monospace", fontWeight: 800, margin: "10px 0", color: detailModal.type === "income" ? "#34d399" : "#f87171" } }, formatTRY(detailModal.amount)),
          React.createElement("div", { className: "aud-badge", style: { marginBottom: 14 } }, `🇦🇺 ${formatAUD(toAUD(detailModal.amount))}`),
          React.createElement("div", { style: { background: "#1c1c24", borderRadius: 24, padding: 16, marginBottom: 20 } },
            React.createElement("div", null, `👤 Kişi: ${detailModal.person}`),
            React.createElement("div", { className: "mt-2" }, `📅 Tarih: ${new Date(detailModal.date).toLocaleDateString("tr-TR")}`),
            React.createElement("div", { className: "mt-2" }, `📝 Not: ${detailModal.note || "—"}`)
          ),
          React.createElement("div", { style: { display: "flex", gap: 12 } },
            React.createElement("button", { className: "btn", style: { flex: 1, background: "#2c5f5f", padding: 12, borderRadius: 40 }, onClick: () => { openEdit(detailModal); setDetailModal(null); } }, "✏️ Düzenle"),
            React.createElement("button", { className: "btn", style: { flex: 1, background: "#6b2e2e", padding: 12, borderRadius: 40 }, onClick: () => { if (confirm("Silinsin mi?")) deleteTx(detailModal.id); } }, "🗑️ Sil"),
            React.createElement("button", { className: "btn", style: { background: "#2c2c36", padding: "12px 18px", borderRadius: 40 }, onClick: () => setDetailModal(null) }, "Kapat")
          )
        )
      );
    };

    // Header
    const Header = () => {
      if (view === "add") return null;
      return React.createElement("div", { style: { padding: "20px 18px 10px" } },
        React.createElement("div", { className: "flex-between" },
          React.createElement("div", null,
            React.createElement("div", { style: { fontSize: 10, fontWeight: 800, color: "#a78bfa", letterSpacing: 1 } }, "BÜTÇE ASİSTANI"),
            React.createElement("div", { style: { fontSize: 22, fontWeight: 800 } },
              view === "person" && selectedPerson ? `${selectedPerson} · Detay` : view === "month" ? "📅 Ay Özeti" : "Cüzdan"
            )
          ),
          React.createElement("div", { style: { display: "flex", gap: 6, background: "#15151c", padding: "5px 12px", borderRadius: 40 } },
            React.createElement("span", null, "🇦🇺"),
            React.createElement("span", { style: { fontFamily: "monospace", fontSize: 12 } }, rateLoading ? "..." : `A$${rate.toFixed(5)}`),
            React.createElement("button", { className: "btn", onClick: async () => { setRateLoading(true); try { const r = await fetch("https://api.frankfurter.app/latest?from=TRY&to=AUD"); const d = await r.json(); if (d.rates?.AUD) setRate(d.rates.AUD); } catch(e) {} finally { setRateLoading(false); } }, style: { fontSize: 12 } }, "⟳")
          )
        )
      );
    };

    // Bottom Nav
    const BottomNav = () => {
      return React.createElement("div", { className: "bottom-nav" },
        React.createElement("button", { className: `nav-btn ${view === "home" ? "nav-active" : ""}`, onClick: () => goHome() },
          React.createElement("span", { style: { fontSize: 22 } }, "🏠"),
          React.createElement("span", null, "Ana Sayfa")
        ),
        React.createElement("button", { className: "nav-btn", onClick: () => { setView("add"); setEditTarget(null); setForm(blankForm); } },
          React.createElement("span", { style: { fontSize: 22 } }, "➕"),
          React.createElement("span", null, "Ekle")
        ),
        React.createElement("button", { className: "nav-btn", onClick: () => { const data = localStorage.getItem("wallet_data"); if (data) { const blob = new Blob([data], { type: "application/json" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `cuzdan_${Date.now()}.json`; a.click(); URL.revokeObjectURL(blob); } } },
          React.createElement("span", { style: { fontSize: 22 } }, "💾"),
          React.createElement("span", null, "Yedek")
        )
      );
    };

    // Ana render
    return React.createElement("div", null,
      React.createElement(Header, null),
      view === "home" && React.createElement(HomeView, null),
      view === "person" && React.createElement(PersonView, null),
      view === "month" && React.createElement(MonthView, null),
      view === "add" && React.createElement(AddView, null),
      React.createElement(DetailModal, null),
      React.createElement(BottomNav, null),
      view !== "add" && React.createElement("button", { className: "floating-btn", onClick: openAdd }, "+")
    );
  };

  // Uygulamayı render et
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(App, null));
}
</script>
</body>
</html>
