<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>✨ Cüzdan Asistanı Pro | Gelir & Gider Takip</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800;14..32,900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #050505; color: #ededee; font-family: 'Inter', sans-serif; overflow-x: hidden; }
  #root { max-width: 500px; margin: 0 auto; min-height: 100vh; position: relative; background: #0a0a0c; }
  .glass-card { background: rgba(20, 20, 28, 0.9); backdrop-filter: blur(2px); border: 1px solid rgba(255,255,255,0.05); border-radius: 32px; }
  .neumorph { background: #121216; border-radius: 28px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
  .btn { cursor: pointer; transition: all 0.12s ease; font-weight: 600; border: none; }
  .btn:active { transform: scale(0.96); opacity: 0.85; }
  .slide-up { animation: slideUp 0.28s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .chip { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 40px; font-size: 12px; font-weight: 700; background: #1e1e24; cursor: pointer; transition: 0.1s; }
  .chip-active { background: #7c3aed; color: white; box-shadow: 0 2px 8px rgba(124,58,237,0.4); }
  .tx-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-radius: 24px; background: #0f0f12; margin-bottom: 8px; transition: 0.1s; cursor: pointer; border: 1px solid #1f1f24; }
  .tx-row:active { background: #1c1c22; transform: scale(0.99); }
  .floating-btn { position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: #7c3aed; box-shadow: 0 8px 18px rgba(124,58,237,0.5); display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; z-index: 30; border: none; color: white; transition: 0.1s; }
  .floating-btn:active { transform: scale(0.92); background: #6d28d9; }
  .input-field { width: 100%; background: #18181c; border-radius: 24px; padding: 14px 18px; color: #f0ede8; font-size: 15px; font-weight: 500; margin-bottom: 14px; border: 1px solid #2a2a30; transition: 0.2s; }
  .input-field:focus { border-color: #7c3aed; outline: none; background: #202026; }
  .progress-bar { height: 6px; background: #2a2a30; border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 10px; transition: width 0.4s; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 200; display: flex; align-items: flex-end; }
  .modal-card { background: #121216; border-radius: 32px 32px 0 0; width: 100%; padding: 28px 22px 38px; animation: slideUp 0.25s; max-height: 85vh; overflow-y: auto; }
  .category-badge { background: #25252c; border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 600; color: #bbb; }
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 500px; margin: 0 auto; background: #0c0c10; backdrop-filter: blur(12px); border-top: 1px solid #22222a; display: flex; justify-content: space-around; padding: 8px 20px 22px; z-index: 40; }
  .nav-btn { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 12px; color: #8e8e98; font-weight: 600; transition: 0.1s; cursor: pointer; }
  .nav-active { color: #c084fc; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ---------- SABITLER ----------
const PEOPLE = ["Erdal", "A.A", "N.A"];
const CATEGORIES = {
  income: ["Maaş", "Freelance", "Hediye", "Yatırım", "Diğer Gelir"],
  expense: ["Alışveriş", "Fatura", "Ulaşım", "Eğlence", "Sağlık", "Kira", "Yemek", "Diğer"]
};

const formatTRY = (n) => new Intl.NumberFormat("tr-TR", { style: "currency", currency: "TRY", maximumFractionDigits: 0 }).format(n);
const formatAUD = (n) => new Intl.NumberFormat("en-AU", { style: "currency", currency: "AUD", minimumFractionDigits: 2 }).format(n);
const formatDateShort = (d) => new Date(d).toLocaleDateString("tr-TR", { day: "numeric", month: "short" });

const SAMPLE_DATA = [
  { id: 1001, type: "income", person: "Erdal", amount: 15000, note: "Mart maaşı", category: "Maaş", date: "2026-03-01" },
  { id: 1002, type: "expense", person: "Erdal", amount: 3500, note: "Kira ödemesi", category: "Kira", date: "2026-03-03" },
  { id: 1003, type: "expense", person: "A.A", amount: 850, note: "Migros", category: "Alışveriş", date: "2026-03-05" },
  { id: 1004, type: "income", person: "A.A", amount: 2200, note: "Web projesi", category: "Freelance", date: "2026-03-07" },
  { id: 1005, type: "expense", person: "N.A", amount: 320, note: "İstanbulkart", category: "Ulaşım", date: "2026-03-08" },
  { id: 1006, type: "income", person: "N.A", amount: 5000, note: "Şirket maaşı", category: "Maaş", date: "2026-03-09" },
  { id: 1007, type: "expense", person: "Erdal", amount: 540, note: "Sinema + yemek", category: "Eğlence", date: "2026-03-12" },
  { id: 1008, type: "expense", person: "A.A", amount: 1250, note: "Elektrik faturası", category: "Fatura", date: "2026-02-18" },
];

function DonutChartSmall({ income, expense }) {
  const total = income + expense || 1;
  const incDeg = (income / total) * 360;
  const expDeg = (expense / total) * 360;
  const r = 34, cx = 44, cy = 44;
  const polarToCart = (deg, rad) => ({ x: cx + rad * Math.cos((deg-90)*Math.PI/180), y: cy + rad * Math.sin((deg-90)*Math.PI/180) });
  const startInc = 0;
  const endInc = incDeg;
  const startExp = endInc;
  const endExp = endInc + expDeg;
  const largeArcInc = incDeg > 180 ? 1 : 0;
  const largeArcExp = expDeg > 180 ? 1 : 0;
  const pInc1 = polarToCart(startInc, r);
  const pInc2 = polarToCart(endInc, r);
  const pExp1 = polarToCart(startExp, r);
  const pExp2 = polarToCart(endExp, r);
  return (
    <svg width="88" height="88" viewBox="0 0 88 88">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#2a2a30" strokeWidth="10"/>
      {income > 0 && <path d={`M ${cx} ${cy} L ${pInc1.x} ${pInc1.y} A ${r} ${r} 0 ${largeArcInc} 1 ${pInc2.x} ${pInc2.y} Z`} fill="#34d399" opacity="0.9"/>}
      {expense > 0 && <path d={`M ${cx} ${cy} L ${pExp1.x} ${pExp1.y} A ${r} ${r} 0 ${largeArcExp} 1 ${pExp2.x} ${pExp2.y} Z`} fill="#f87171" opacity="0.9"/>}
    </svg>
  );
}

function App() {
  const [txs, setTxs] = useState(() => {
    try { const stored = localStorage.getItem("cuzdan_pro"); return stored ? JSON.parse(stored) : SAMPLE_DATA; } catch { return SAMPLE_DATA; }
  });
  const [rate, setRate] = useState(0.0325);
  const [rateLoading, setRateLoading] = useState(true);
  const [view, setView] = useState("home");
  const [selectedPerson, setSelectedPerson] = useState(null);
  const [editTarget, setEditTarget] = useState(null);
  const [detailModal, setDetailModal] = useState(null);
  const [filterType, setFilterType] = useState("all");
  const [filterPerson, setFilterPerson] = useState("all");
  const [filterCategory, setFilterCategory] = useState("all");
  const [monthViewKey, setMonthViewKey] = useState(null);
  const [personTxFilter, setPersonTxFilter] = useState("all");
  const [personSearch, setPersonSearch] = useState("");

  const blankForm = { type: "expense", person: "Erdal", amount: "", note: "", category: "Diğer", date: new Date().toISOString().split("T")[0] };
  const [form, setForm] = useState(blankForm);

  useEffect(() => { localStorage.setItem("cuzdan_pro", JSON.stringify(txs)); }, [txs]);

  const fetchRate = useCallback(async () => {
    setRateLoading(true);
    try {
      const res = await fetch("https://api.frankfurter.app/latest?from=TRY&to=AUD");
      const data = await res.json();
      if (data.rates?.AUD) setRate(data.rates.AUD);
    } catch (e) { console.warn(e); }
    finally { setRateLoading(false); }
  }, []);
  useEffect(() => { fetchRate(); }, []);

  const toAUD = (n) => n * rate;

  const totalIncome = txs.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0);
  const totalExpense = txs.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0);
  const balance = totalIncome - totalExpense;

  const personStats = PEOPLE.map(p => {
    const inc = txs.filter(t => t.person === p && t.type === "income").reduce((s, t) => s + t.amount, 0);
    const exp = txs.filter(t => t.person === p && t.type === "expense").reduce((s, t) => s + t.amount, 0);
    return { name: p, income: inc, expense: exp, balance: inc - exp };
  });

  // month aggregator
  const monthMap = {};
  txs.forEach(t => {
    const d = new Date(t.date);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    if (!monthMap[key]) monthMap[key] = { inc: 0, exp: 0, label: d.toLocaleDateString("tr-TR", { month: "long", year: "numeric" }), transactions: [] };
    monthMap[key][t.type === "income" ? "inc" : "exp"] += t.amount;
    monthMap[key].transactions.push(t);
  });
  const monthKeys = Object.keys(monthMap).sort().reverse();

  const filteredHome = txs.filter(t => (filterType === "all" || t.type === filterType) && (filterPerson === "all" || t.person === filterPerson) && (filterCategory === "all" || t.category === filterCategory)).sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 12);

  const openAdd = () => { setForm(blankForm); setEditTarget(null); setView("add"); };
  const openEdit = (tx) => { setForm({ ...tx, amount: String(tx.amount) }); setEditTarget(tx); setView("add"); setDetailModal(null); };
  const deleteTx = (id) => { setTxs(prev => prev.filter(t => t.id !== id)); setDetailModal(null); };
  const submitTx = () => {
    if (!form.amount || !form.person) return;
    const amountNum = parseFloat(form.amount);
    if (isNaN(amountNum)) return;
    const newTx = { ...form, amount: amountNum, id: editTarget ? editTarget.id : Date.now() };
    if (editTarget) setTxs(prev => prev.map(t => t.id === editTarget.id ? newTx : t));
    else setTxs(prev => [...prev, newTx]);
    setView("home"); setEditTarget(null); setForm(blankForm);
  };

  const goHome = () => { setView("home"); setSelectedPerson(null); setMonthViewKey(null); setFilterType("all"); setFilterPerson("all"); setFilterCategory("all"); setDetailModal(null); };

  const openPersonDetail = (name) => { setSelectedPerson(name); setPersonTxFilter("all"); setPersonSearch(""); setView("person"); };
  const openMonthDetail = (key) => { setMonthViewKey(key); setView("month"); };

  const currentMonthData = monthViewKey ? monthMap[monthViewKey] : null;

  const personTxs = selectedPerson ? txs.filter(t => t.person === selectedPerson && (personTxFilter === "all" || t.type === personTxFilter)).filter(t => personSearch === "" || t.note?.toLowerCase().includes(personSearch.toLowerCase())).sort((a, b) => new Date(b.date) - new Date(a.date)) : [];

  const TransactionItem = ({ tx, onClick }) => (
    <div className="tx-row" onClick={() => onClick(tx)}>
      <div style={{ display: "flex", gap: 12, alignItems: "center", flex: 1 }}>
        <div style={{ width: 42, height: 42, borderRadius: 30, background: tx.type === "income" ? "#0e2a1f" : "#2c1a1a", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>{tx.type === "income" ? "📈" : "💸"}</div>
        <div><div style={{ fontWeight: 700 }}>{tx.note || (tx.type === "income" ? "Gelir" : "Harcama")}</div><div style={{ fontSize: 11, color: "#999", display: "flex", gap: 6, marginTop: 4 }}><span>{tx.person}</span><span className="category-badge">{tx.category || "Genel"}</span><span>{formatDateShort(tx.date)}</span></div></div>
      </div>
      <div style={{ textAlign: "right" }}><div style={{ fontWeight: 800, fontFamily: "'Space Mono', monospace", color: tx.type === "income" ? "#34d399" : "#f87171" }}>{tx.type === "income" ? `+${formatTRY(tx.amount)}` : `-${formatTRY(tx.amount)}`}</div><div className="aud-badge" style={{ fontSize: 9, marginTop: 3, background: "#0f1a22" }}>🇦🇺 {formatAUD(toAUD(tx.amount))}</div></div>
    </div>
  );

  return (
    <div style={{ paddingBottom: 90 }}>
      {/* Header */}
      <div style={{ padding: "20px 18px 10px" }}>
        {view !== "add" && <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}><div><div style={{ fontSize: 11, fontWeight: 800, color: "#a78bfa", letterSpacing: 1 }}>AKILLI BÜTÇE</div><div style={{ fontSize: 24, fontWeight: 800 }}>{view === "person" && selectedPerson ? `${selectedPerson} · Detay` : view === "month" ? "📅 Ay Özeti" : "Cüzdan Asistanı"}</div></div><div className="rate-bar" style={{ display: "flex", gap: 6, background: "#15151c", padding: "6px 12px", borderRadius: 40 }}><span>🇦🇺</span><span style={{ fontFamily: "monospace", fontSize: 13 }}>{rateLoading ? "..." : `A$${rate.toFixed(5)}`}</span><button className="btn" onClick={fetchRate} style={{ background: "none", fontSize: 14 }}>⟳</button></div></div>}
      </div>

      {/* HOME */}
      {view === "home" && <div className="slide-up" style={{ padding: "0 18px" }}>
        <div className="neumorph" style={{ padding: 20, background: "linear-gradient(135deg, #191622, #0f0f17)", marginBottom: 24 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: "#c4b5fd" }}>TOPLAM BAKİYE</div>
          <div style={{ fontSize: 38, fontWeight: 800, fontFamily: "'Space Mono', monospace", color: balance >= 0 ? "#c4b5fd" : "#ff9f8f" }}>{formatTRY(balance)}</div>
          <div className="aud-badge" style={{ background: "#2a1e44", marginTop: 6 }}>🇦🇺 {formatAUD(toAUD(balance))}</div>
          <div style={{ display: "flex", gap: 20, marginTop: 18 }}><div><div style={{ fontSize: 10, color: "#aaa" }}>GELİR</div><div style={{ fontWeight: 800, color: "#34d399" }}>{formatTRY(totalIncome)}</div><div className="aud-badge" style={{ marginTop: 3 }}>A$ {toAUD(totalIncome).toFixed(2)}</div></div><div><div style={{ fontSize: 10, color: "#aaa" }}>GİDER</div><div style={{ fontWeight: 800, color: "#f87171" }}>{formatTRY(totalExpense)}</div><div className="aud-badge" style={{ marginTop: 3 }}>A$ {toAUD(totalExpense).toFixed(2)}</div></div></div>
        </div>

        <div style={{ marginBottom: 20 }}><div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>👥 Kişi Özetleri</div>{personStats.map(p => { const saveRate = p.income > 0 ? Math.min(100, (p.balance / p.income) * 100) : 0; return (<div key={p.name} className="glass-card" style={{ padding: 12, marginBottom: 10, cursor: "pointer", borderRadius: 24 }} onClick={() => openPersonDetail(p.name)}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}><div><span style={{ fontWeight: 800 }}>{p.name}</span><div style={{ fontSize: 12, color: "#7c7c8c" }}>tasarruf %{Math.round(saveRate)}</div></div><div style={{ textAlign: "right" }}><div style={{ fontWeight: 700 }}>{formatTRY(p.balance)}</div><div className="aud-badge">A$ {toAUD(p.balance).toFixed(2)}</div></div></div><div className="progress-bar" style={{ marginTop: 8 }}><div className="progress-fill" style={{ width: `${saveRate}%`, background: "#34d399" }} /></div></div>); })}
        </div>

        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
          <select className="chip" value={filterType} onChange={e => setFilterType(e.target.value)}><option value="all">📌 Tümü</option><option value="income">💰 Gelir</option><option value="expense">💸 Gider</option></select>
          <select className="chip" value={filterPerson} onChange={e => setFilterPerson(e.target.value)}><option value="all">👤 Tüm kişiler</option>{PEOPLE.map(p => <option key={p}>{p}</option>)}</select>
          <select className="chip" value={filterCategory} onChange={e => setFilterCategory(e.target.value)}><option value="all">🏷️ Tüm kategoriler</option>{[...CATEGORIES.income, ...CATEGORIES.expense].map(c => <option key={c}>{c}</option>)}</select>
        </div>

        <div style={{ fontWeight: 700, margin: "6px 0 8px" }}>📋 Son işlemler</div>
        {filteredHome.map(tx => <TransactionItem key={tx.id} tx={tx} onClick={(t) => setDetailModal(t)} />)}
        {filteredHome.length === 0 && <div style={{ textAlign: "center", padding: 32, color: "#555" }}>İşlem eklemek için + butonuna dokun</div>}
        
        <div style={{ marginTop: 20, marginBottom: 30 }}><div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>📆 Aylar (özet)</div><div style={{ display: "flex", gap: 10, overflowX: "auto" }}>{monthKeys.map(key => { const m = monthMap[key]; return (<div key={key} className="glass-card" style={{ padding: "10px 16px", minWidth: 110, cursor: "pointer" }} onClick={() => openMonthDetail(key)}><div style={{ fontWeight: 800, fontSize: 13 }}>{m.label.split(" ")[0]}</div><div><span style={{ color: "#34d399" }}>{formatTRY(m.inc)}</span> / <span style={{ color: "#f87171" }}>{formatTRY(m.exp)}</span></div><div style={{ fontSize: 11 }}>Bakiye: {formatTRY(m.inc - m.exp)}</div></div>); })}</div></div>
      </div>}

      {/* PERSON DETAY */}
      {view === "person" && selectedPerson && <div className="slide-up" style={{ padding: "0 18px" }}><button className="btn" onClick={goHome} style={{ background: "#25252e", padding: "8px 18px", borderRadius: 40, marginBottom: 16 }}>← Ana Sayfa</button><div style={{ display: "flex", gap: 14, alignItems: "center", marginBottom: 20 }}><div className="person-avatar" style={{ width: 56, height: 56, background: "#2d2d3a", fontSize: 26, borderRadius: 30 }}>{selectedPerson[0]}</div><div><div style={{ fontWeight: 800, fontSize: 22 }}>{selectedPerson}</div><div style={{ color: "#34d399" }}>Net {formatTRY(personStats.find(p => p.name === selectedPerson)?.balance || 0)}</div></div></div><div style={{ display: "flex", gap: 12, marginBottom: 16 }}><select className="chip" value={personTxFilter} onChange={e => setPersonTxFilter(e.target.value)}><option value="all">Tüm işlemler</option><option value="income">Gelirler</option><option value="expense">Giderler</option></select><input className="input-field" style={{ padding: "8px 14px", margin: 0 }} placeholder="🔍 not ara" value={personSearch} onChange={e => setPersonSearch(e.target.value)} /></div>{personTxs.map(tx => <TransactionItem key={tx.id} tx={tx} onClick={(t) => setDetailModal(t)} />)}{personTxs.length === 0 && <div style={{ textAlign: "center", padding: 40, color: "#666" }}>Bu filtrede kayıt yok</div>}<button className="floating-btn" style={{ position: "relative", marginTop: 28, width: "100%", borderRadius: 60, background: "#7c3aed" }} onClick={() => { setForm({ ...blankForm, person: selectedPerson }); setEditTarget(null); setView("add"); }}>+ Yeni İşlem</button></div>}

      {/* MONTH VIEW */}
      {view === "month" && monthViewKey && currentMonthData && <div className="slide-up" style={{ padding: "0 18px" }}><button className="btn" onClick={goHome} style={{ background: "#25252e", padding: "8px 18px", borderRadius: 40, marginBottom: 16 }}>← Geri</button><div className="neumorph" style={{ padding: 20, textAlign: "center", marginBottom: 20 }}><div style={{ fontSize: 20, fontWeight: 800 }}>{currentMonthData.label}</div><div style={{ display: "flex", justifyContent: "center", gap: 20, marginTop: 12 }}><div><div>💰 Gelir</div><div style={{ fontWeight: 800, color: "#34d399" }}>{formatTRY(currentMonthData.inc)}</div></div><div><div>💸 Gider</div><div style={{ fontWeight:
