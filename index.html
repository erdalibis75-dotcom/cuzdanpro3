<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cüzdan Asistanı</title>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0a0c; color: #ededee; }
        #root { max-width: 500px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
        .card { background: #121216; border: 1px solid #1f1f24; border-radius: 20px; padding: 15px; margin: 10px; }
        .tx-row { display: flex; justify-content: space-between; padding: 12px; border-radius: 15px; background: #121216; margin: 8px 10px; border: 1px solid #1f1f24; }
        .input-field { width: 100%; background: #18181c; border-radius: 12px; padding: 12px; color: #fff; border: 1px solid #2a2a30; margin-bottom: 10px; }
        .btn { background: #7c3aed; color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0c0c10; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #222; }
        .nav-btn { color: #8e8e98; background: none; border: none; font-size: 12px; }
        .floating-btn { position: fixed; bottom: 80px; right: 20px; width: 50px; height: 50px; border-radius: 25px; background: #7c3aed; color: white; border: none; font-size: 24px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const PEOPLE = ["Erdal", "A.A", "N.A"];

        function App() {
            const [view, setView] = useState('home');
            const [txs, setTxs] = useState(() => JSON.parse(localStorage.getItem("wallet_v3")) || []);
            const [form, setForm] = useState({ type: 'expense', person: 'Erdal', amount: '', note: '', date: new Date().toISOString().split('T')[0] });

            useEffect(() => { localStorage.setItem("wallet_v3", JSON.stringify(txs)); }, [txs]);

            const handleSave = () => {
                if(!form.amount || !form.note) return alert("Doldur lütfen!");
                setTxs([{...form, id: Date.now(), amount: parseFloat(form.amount)}, ...txs]);
                setForm({ ...form, amount: '', note: '' });
                setView('home');
            };

            const totals = txs.reduce((a, c) => { a[c.type] += c.amount; return a; }, { income: 0, expense: 0 });

            return (
                <div>
                    {view === 'home' ? (
                        <div>
                            <div className="card">
                                <p style={{color: '#8e8e98'}}>Toplam Bakiye</p>
                                <h1 style={{fontSize: '32px'}}>{totals.income - totals.expense} ₺</h1>
                            </div>
                            <h3 style={{margin: '15px'}}>Son İşlemler</h3>
                            {txs.map(t => (
                                <div className="tx-row" key={t.id}>
                                    <span>{t.note}<br/><small style={{color: '#8e8e98'}}>{t.person}</small></span>
                                    <b style={{color: t.type === 'income' ? '#34d399' : '#f87171'}}>{t.type === 'income' ? '+' : '-'}{t.amount} ₺</b>
                                </div>
                            ))}
                            <button className="floating-btn" onClick={() => setView('add')}>+</button>
                        </div>
                    ) : (
                        <div style={{padding: '20px'}}>
                            <h2>Yeni İşlem</h2>
                            <div style={{display:'flex', gap:10, margin:'15px 0'}}>
                                <button className="btn" style={{background: form.type === 'income' ? '#34d399':'#222'}} onClick={()=>setForm({...form, type:'income'})}>Gelir</button>
                                <button className="btn" style={{background: form.type === 'expense' ? '#f87171':'#222'}} onClick={()=>setForm({...form, type:'expense'})}>Gider</button>
                            </div>
                            <select className="input-field" value={form.person} onChange={e=>setForm({...form, person:e.target.value})}>{PEOPLE.map(p=><option key={p}>{p}</option>)}</select>
                            <input type="number" placeholder="Tutar" className="input-field" value={form.amount} onChange={e=>setForm({...form, amount:e.target.value})}/>
                            <input type="text" placeholder="Açıklama" className="input-field" value={form.note} onChange={e=>setForm({...form, note:e.target.value})}/>
                            <button className="btn" onClick={handleSave}>Kaydet</button>
                            <button className="btn" style={{background:'none', color:'#888'}} onClick={()=>setView('home')}>Vazgeç</button>
                        </div>
                    )}
                    <nav className="bottom-nav">
                        <button className="nav-btn" onClick={()=>setView('home')}>🏠 Ana Sayfa</button>
                        <button className="nav-btn" onClick={()=>alert("Geçmiş yakında!")}>📊 Geçmiş</button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
