<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cüzdan Pro</title>
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #0a0a0a; color: #f0ede8; padding: 15px; padding-bottom: 120px; }
    .pos { color: #34d399 !important; } 
    .neg { color: #f87171 !important; } 
    .card { background: #1a1a1a; border-radius: 24px; padding: 20px; border: 1px solid #222; margin-bottom: 15px; text-align: center; }
    .main-total-card { border-color: #7c3aed66; background: linear-gradient(145deg, #1e1e1e, #111); }
    .person-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .person-box { background: #161616; border: 1px solid #333; border-radius: 18px; padding: 12px 5px; text-align: center; cursor: pointer; transition: 0.2s; }
    .person-box.active { border-color: #7c3aed; background: #7c3aed11; transform: scale(1.03); }
    .person-name { font-size: 11px; font-weight: 900; opacity: 0.5; margin-bottom: 5px; text-transform: uppercase; }
    .person-val { font-size: 13px; font-weight: 900; }
    .month-filter-card { background: #111; border: 1px dashed #333; padding: 15px; border-radius: 20px; margin-bottom: 20px; }
    .month-select { width: 100%; background: #000; border-radius: 12px; padding: 10px; color: #7c3aed; border: 1px solid #7c3aed44; font-weight: 800; outline: none; text-align: center; appearance: none; }
    .tx-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #161616; border-radius: 20px; margin-bottom: 8px; border: 1px solid #222; }
    .input-field { width: 100%; background: #222; border-radius: 14px; padding: 16px; color: #fff; border: 1px solid #333; margin-bottom: 12px; font-size: 16px; outline: none; }
    .btn-save { background: #7c3aed; color: white; border: none; padding: 18px; border-radius: 16px; width: 100%; font-weight: 900; cursor: pointer; }
    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #222; z-index: 1000; }
    .hidden { display: none; }
    .btn-mini { background: none; border: 1px solid #333; color: #666; padding: 6px; border-radius: 8px; font-size: 9px; font-weight: 800; width: 100px; margin: 2px; }
   /* ... önceki stiller aynı ... */
  .filter-search-container {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 15px;
  }
  .mini-input {
    flex: 1; /* Kutuları sola doğru esnek ama küçük tutar */
    background: #000;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 10px;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    outline: none;
  }
  .result-total-box {
    min-width: 90px;
    background: #7c3aed11;
    border: 1px solid #7c3aed66;
    border-radius: 12px;
    padding: 8px;
    text-align: center;
  }
  .result-label { font-size: 8px; font-weight: 900; color: #7c3aed; opacity: 0.8; text-transform: uppercase; }
  .result-val { font-size: 13px; font-weight: 900; color: #fff; }
 
  </style>
</head>
<body>

<div id="home-view">
  <div class="card main-total-card">
    <div style="font-size:10px; opacity:0.5; font-weight:900">GENEL DURUM</div>
    <h1 id="global-balance" style="font-size:32px; margin:5px 0">0 ₺</h1>
    <div id="global-aud" style="color:#7c3aed; font-weight:800; font-size:12px;">≈ 0 AUD</div>
  </div>

  <div class="person-grid" id="person-grid"></div>
<!-- Person Grid'in hemen altına yapıştır -->
<div id="settlement-card" class="card" style="display:none; border-color:#7c3aed66; background:#7c3aed05; padding:15px; margin-top:-10px;">
    <div style="font-size:10px; font-weight:900; color:#7c3aed; margin-bottom:10px; text-transform:uppercase;">⚖️ Borç Dengesi (Hesaplaşma)</div>
    <div id="settlement-results" style="font-size:13px; font-weight:700; line-height:1.6;"></div>
</div>

<button class="btn-mini" onclick="calculateSettlement()" style="width:100%; margin:10px 0; border-color:#7c3aed44; color:#7c3aed;">⚖️ HESAPLAŞMA DURUMUNU GÖR</button>

  <div class="month-filter-card">
    <select id="month-filter" class="month-select" onchange="renderHome()"></select>
  </div>

  <div id="person-detail-area" class="hidden">
  <div class="filter-search-container" style="flex-wrap: wrap;">
    <select id="month-filter" class="mini-input" onchange="renderHome()"></select>
    
    <!-- KATEGORİ ARAMA KUTUSU -->
    <select id="cat-search-filter" class="mini-input" onchange="renderHome()">
        <option value="all">Tüm Kategoriler</option>
    </select>

    <input type="text" id="search-input" placeholder="Açıklamada ara..." class="mini-input" oninput="renderHome()">
    
    <div class="result-total-box">
      <div class="result-label">TOPLAM</div>
      <div id="search-total-val" class="result-val">0 ₺</div>
    </div>
  </div>
  <div id="history-container"></div>
</div>

    <input type="text" id="search-input" placeholder="Ara..." class="mini-input" oninput="renderHome()">
    
    <div class="result-total-box">
      <div class="result-label">TOPLAM</div>
      <div id="search-total-val" class="result-val">0 ₺</div>
    </div>
  </div>
  <div id="history-container"></div>
</div>


  <div style="display: flex; justify-content: space-around; margin-top: 20px;">
    <button class="btn-mini" onclick="exportJSON()">📥 YEDEKLE</button>
    <button class="btn-mini" onclick="document.getElementById('import-file').click()">📤 YÜKLE</button>
    <input type="file" id="import-file" class="hidden" onchange="importJSON(event)">
  </div>
</div>

<div id="add-view" class="hidden">
  <h2 style="margin-bottom:20px">İşlem Ekle</h2>
  <select id="f-type" class="input-field"><option value="expense">Gider (-)</option><option value="income">Gelir (+)</option></select>
  <select id="f-person" class="input-field"></select>
  <select id="f-category" class="input-field"></select>

  <input type="date" id="f-date" class="input-field">
  <input type="number" id="f-amount" placeholder="Tutar (₺)" class="input-field">
  <input type="text" id="f-note" placeholder="Açıklama" class="input-field">
  <button class="btn-save" onclick="addTx()">KAYDET</button>
  <button onclick="showView('home')" style="width:100%; background:none; border:none; color:#666; margin-top:20px; font-weight:700">İPTAL</button>
  <button id="delete-btn" onclick="deleteCurrent()" style="width:100%; background:#f8717122; color:#f87171; border:none; padding:12px; border-radius:16px; margin-top:10px; font-weight:700;">SİL</button>

</div>

<div class="nav-bar">
<div onclick="goHome()" style="text-align:center; cursor:pointer">
  <div style="font-size:20px">📊</div>
  <div style="font-size:10px; font-weight:800">ÖZET</div>
</div>

  <div onclick="showView('add')" style="text-align:center; cursor:pointer"><div style="font-size:20px">➕</div><div style="font-size:10px; font-weight:800">EKLE</div></div>
</div>

 <script>  let txs = JSON.parse(localStorage.getItem('txs_v2') || '[]');
  const people = ["Erdal", "A.A", "N.A"];
  const months = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
  let activeTab = null, rate = 0.0318, editId = null;

  const categories = {
    income: [
        { n: "Maaş", i: "💰" },
        { n: "Kira", i: "🏠" }
    ],
    expense: [
        { n: "Fatura Örnekköy", i: "⚡" },
        { n: "Fatura Dedebaşı", i: "💧" },
        { n: "Fatura Çimentepe", i: "🔥" },
        { n: "Fatura Seferihisar", i: "📡" },
        { n: "Fatura Mersin", i: "🏢" },
        { n: "E.T", i: "👔" },
        { n: "Ev", i: "🧹" },
        { n: "Nil", i: "👧" },
        { n: "Ex", i: "📉" }
    ]
  };

  function init() {
    const pSelect = document.getElementById('f-person');
    people.forEach(p => pSelect.innerHTML += `<option value="${p}">${p}</option>`);
    document.getElementById('f-date').valueAsDate = new Date();
    document.getElementById('f-type').onchange = updateCatOptions;
    updateCatOptions();
    updateMonthDropdown();
    renderHome();
  }

  function updateCatOptions() {
    const type = document.getElementById('f-type').value;
    const catSelect = document.getElementById('f-category');
    catSelect.innerHTML = "";
    categories[type].forEach(c => {
        catSelect.innerHTML += `<option value="${c.n}">${c.i} ${c.n}</option>`;
    });
  }

  function updateMonthDropdown() {
    const dropdown = document.getElementById('month-filter');
    const unique = [...new Set(txs.map(t => {
      const d = new Date(t.date);
      return `${months[d.getMonth()]} ${d.getFullYear()}`;
    }))];
    let opts = '<option value="Hepsi">Tüm Zamanlar</option>';
    unique.forEach(m => opts += `<option value="${m}">${m}</option>`);
    dropdown.innerHTML = opts;
  }

  function showView(v) {
    document.getElementById('home-view').classList.toggle('hidden', v !== 'home');
    document.getElementById('add-view').classList.toggle('hidden', v !== 'add');
    if (v === 'home') {
        document.querySelector('#add-view h2').innerText = "İşlem Ekle";
        editId = null;
    }
  }

  function goHome() {
    activeTab = null;
    const searchInput = document.getElementById('search-input');
    if(searchInput) searchInput.value = "";
    showView('home');
    renderHome();
  }

  function prepareEdit(id) {
    const t = txs.find(x => x.id === id);
    if (!t) return;
    editId = id;
    showView('add');
    document.getElementById('f-type').value = t.type;
    updateCatOptions();
    document.getElementById('f-person').value = t.person;
    document.getElementById('f-category').value = t.category;
    document.getElementById('f-date').value = t.date;
    document.getElementById('f-amount').value = t.amount;
    document.getElementById('f-note').value = t.note;
    document.querySelector('#add-view h2').innerText = "İşlemi Düzenle";
  }

  function addTx() {
    const amountInput = document.getElementById('f-amount');
    const noteInput = document.getElementById('f-note');
    if(!amountInput.value || !noteInput.value) return alert("Doldur!");

    const txData = {
        id: editId || Date.now(),
        type: document.getElementById('f-type').value,
        person: document.getElementById('f-person').value,
        category: document.getElementById('f-category').value,
        date: document.getElementById('f-date').value,
        amount: parseFloat(amountInput.value),
        note: noteInput.value
    };

    if (editId) {
        txs = txs.map(t => t.id === editId ? txData : t);
        editId = null;
    } else {
        txs.push(txData);
    }

    localStorage.setItem('txs_v2', JSON.stringify(txs));
    amountInput.value = ""; noteInput.value = "";
    updateMonthDropdown();
    goHome();
  }

  function deleteCurrent() {
    if (editId && confirm("Bu işlemi silmek istediğinize emin misiniz?")) {
        txs = txs.filter(t => t.id !== editId);
        localStorage.setItem('txs_v2', JSON.stringify(txs));
        editId = null;
        goHome();
    }
  }

  function renderHome() {
    const mFilter = document.getElementById('month-filter').value;
    const catSearch = document.getElementById('cat-search-filter') ? document.getElementById('cat-search-filter').value : "all";
    const sInput = document.getElementById('search-input') ? document.getElementById('search-input').value.toLowerCase() : "";
    
    let dateFiltered = txs.filter(t => {
      const d = new Date(t.date);
      const mStr = `${months[d.getMonth()]} ${d.getFullYear()}`;
      return mFilter === "Hepsi" || mStr === mFilter;
    });

    const globalBal = dateFiltered.reduce((acc, t) => t.type === 'income' ? acc + t.amount : acc - t.amount, 0);
    document.getElementById('global-balance').innerText = globalBal.toLocaleString('tr-TR') + " ₺";
    document.getElementById('global-balance').className = globalBal >= 0 ? "pos" : "neg";
    document.getElementById('global-aud').innerText = "≈ " + (globalBal * rate).toFixed(2) + " AUD";

    const grid = document.getElementById('person-grid');
    grid.innerHTML = "";
    people.forEach(p => {
      const pBal = dateFiltered.filter(t => t.person === p).reduce((acc, t) => t.type === 'income' ? acc + t.amount : acc - t.amount, 0);
      grid.innerHTML += `
        <div class="person-box ${activeTab === p ? 'active' : ''}" onclick="togglePerson('${p}')">
          <div class="person-name">${p}</div>
          <div class="person-val ${pBal >= 0 ? 'pos' : 'neg'}">${pBal.toLocaleString('tr-TR')}₺</div>
        </div>`;
    });

    const history = document.getElementById('history-container');
    if (activeTab) {
      document.getElementById('person-detail-area').classList.remove('hidden');
      
      const personData = dateFiltered.filter(t => t.person === activeTab);
      updateSearchCatDropdown(personData);

      let pList = personData.filter(t => {
          const mCat = catSearch === "all" || t.category === catSearch;
          const mNote = t.note.toLowerCase().includes(sInput);
          return mCat && mNote;
      });
      
      const searchTotal = pList.reduce((acc, t) => t.type === 'income' ? acc + t.amount : acc - t.amount, 0);
      const totalEl = document.getElementById('search-total-val');
      totalEl.innerText = searchTotal.toLocaleString('tr-TR') + " ₺";
      totalEl.className = 'result-val ' + (searchTotal >= 0 ? 'pos' : 'neg');

      history.innerHTML = "";
      const allCats = [...categories.income, ...categories.expense];
      pList.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(t => {
        const catObj = allCats.find(c => c.n === t.category);
        const icon = catObj ? catObj.i : "📁";
        history.innerHTML += `
          <div class="tx-row" onclick="prepareEdit(${t.id})">
            <div style="text-align:left">
              <div style="font-weight:900; font-size:14px">${t.note}</div>
              <div style="font-size:10px; opacity:0.6;">
                <span style="color:#7c3aed; font-weight:800">${icon} ${t.category || 'Diğer'}</span> • ${t.date}
              </div>
            </div>
            <div class="${t.type === 'income' ? 'pos' : 'neg'}" style="font-weight:900">
              ${t.type === 'income' ? '+' : '-'}${t.amount.toLocaleString('tr-TR')}₺
            </div>
          </div>`;
      });
    } else {
      document.getElementById('person-detail-area').classList.add('hidden');
    }
  }

  function updateSearchCatDropdown(data) {
    const dropdown = document.getElementById('cat-search-filter');
    if(!dropdown) return;
    const currentVal = dropdown.value;
    const uniqueCats = [...new Set(data.map(t => t.category))].filter(Boolean);
    let opts = '<option value="all">Tüm Kategoriler</option>';
    uniqueCats.forEach(c => opts += `<option value="${c}">${c}</option>`);
    if(dropdown.innerHTML !== opts) {
        dropdown.innerHTML = opts;
        dropdown.value = uniqueCats.includes(currentVal) ? currentVal : "all";
    }
  }

  function togglePerson(p) { activeTab = (activeTab === p) ? null : p; renderHome(); }
  
  function calculateSettlement() {
    const card = document.getElementById('settlement-card');
    const resDiv = document.getElementById('settlement-results');
    const mFilter = document.getElementById('month-filter').value;
    let filteredExps = txs.filter(t => t.type === 'expense' && (mFilter === "Hepsi" || `${months[new Date(t.date).getMonth()]} ${new Date(t.date).getFullYear()}` === mFilter));
    if (filteredExps.length === 0) return alert("Harcama bulunamadı!");
    const totalExp = filteredExps.reduce((acc, t) => acc + t.amount, 0);
    const perPerson = totalExp / people.length;
    let balances = people.map(p => {
        const paid = filteredExps.filter(t => t.person === p).reduce((acc, t) => acc + t.amount, 0);
        return { name: p, diff: paid - perPerson };
    });
    card.style.display = card.style.display === 'none' ? 'block' : 'none';
    let html = `<div style="opacity:0.6; font-size:11px; margin-bottom:8px;">Kişi başı gider: <b>${perPerson.toFixed(2)} ₺</b></div>`;
    balances.forEach(b => {
        html += `<div class="${b.diff >= 0 ? 'pos' : 'neg'}">${b.diff >= 0 ? '✅' : '⚠️'} <b>${b.name}</b>: ${b.diff >= 0 ? '+' : ''}${b.diff.toFixed(2)} ₺</div>`;
    });
    resDiv.innerHTML = html;
  }

  function exportJSON() {
    const blob = new Blob([JSON.stringify(txs)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = "cuzdan.json"; a.click();
  }

  function importJSON(e) {
    const reader = new FileReader();
    reader.onload = (event) => { 
        txs = JSON.parse(event.target.result); 
        localStorage.setItem('txs_v2', JSON.stringify(txs)); 
        updateMonthDropdown();
        renderHome(); 
    };
    reader.readAsText(e.target.files[0]);
  }

  init();
</script>
</body>
</html>
